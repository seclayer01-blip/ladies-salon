<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recreated Design Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset for consistent cross-browser look */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            color: #1a1a1a;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Global Container --- */
        .page-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
        }

        /* --- Header Section --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .header-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: #000;
        }

        .header-links {
            display: flex;
            gap: 20px;
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
        }

        /* --- Split Hero Section (White/Beige) --- */
        .hero {
            display: flex;
            position: relative;
            background-color: #fff; /* Base background is white */
        }

        /* Diagonal beige split overlay */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background-color: #E6DDD3; /* Subtle beige/tan tone from image */
            z-index: 0;
        }

        .hero-left, .hero-right {
            flex: 1;
            padding: 150px 50px 50px; /* Adjust padding for text and image placement */
            z-index: 10;
            position: relative;
        }

        /* 'DESIGN' large background text on the left */
        .hero-left .bg-text {
            position: absolute;
            top: 100px;
            left: 0;
            font-family: 'Playfair Display', serif;
            font-size: 8rem;
            font-weight: bold;
            color: #f7f7f7; /* Very light grey */
            opacity: 0.8;
            letter-spacing: 15px;
            text-transform: uppercase;
            writing-mode: vertical-lr; /* Vertically text flow like image */
            transform: rotate(180deg);
        }

        .hero-date {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            position: absolute;
            left: 10px;
            top: 250px;
        }

        .hero-content {
            margin-top: 100px; /* Offset text from large background text */
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 700;
            color: #000;
            line-height: 1.1;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero-subtitle {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
        }

        .hero-right img {
            max-width: 100%;
            height: auto;
            position: relative;
            top: 0;
            left: 0;
            z-index: 1; /* Place image in front of beige overlay */
        }

        .hero-right .small-text {
            font-size: 0.75rem;
            color: #666;
            text-align: right;
            position: absolute;
            right: 20px;
            top: 150px;
        }

        /* --- White 'Some Words About Main Task' Section --- */
        .main-task {
            background-color: #fff;
            padding: 100px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-content {
            flex: 1;
            padding-right: 50px;
        }

        .task-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #000;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .task-description {
            font-size: 0.8rem;
            color: #777;
            max-width: 400px;
        }

        .task-images {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        .task-images img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        
        <header>
            <div class="header-links">
                <a href="#">Back</a>
            </div>
            <div class="header-brand">RADIANCE</div>
            <div class="header-links">
                <a href="#">Interface</a>
                <a href="#">UI/UX Design</a>
            </div>
        </header>

        <section class="hero">
            <div class="hero-left">
                <div class="bg-text">DESIGN</div>
                <div class="hero-date">July 2018</div>
                <div class="hero-content">
                    <h1 class="hero-title">Beauty<br>Salon</h1>
                    <p class="hero-subtitle">Design Website</p>
                </div>
            </div>
            <div class="hero-right">
                <img src="path/to/model-image.jpg" alt="Beautiful Model Image">
                <div class="small-text">Designed by Max Mykhailov</div>
            </div>
        </section>

        <section class="main-task">
            <div class="task-content">
                <h2 class="task-title">SOME WORDS ABOUT MAIN TASK</h2>
                <p class="task-description">I tried to create a comfortable, modern, and beautiful design. Show the necessary information about the club and bring it to the target action.</p>
            </div>
            <div class="task-images">
                <img src="path/to/salon-tools-image.jpg" alt="Salon Tools Image">
            </div>
        </section>
    </div>

</body>
</html>
